# @package _global_.hydra.launcher
defaults:
  - _self_
  - optional /local/slurm: default

_target_: hydra_plugins.hydra_submitit_launcher.submitit_launcher.SlurmLauncher
submitit_folder: ${hydra.sweep.dir}/.submitit/%j
timeout_min: 1440  # 24 hours
cpus_per_task: 1
gpus_per_node: 1
tasks_per_node: 1
mem_gb: 100
nodes: 1
name: ${hydra.job.name}
partition: gpu
exclude: 'mlcbm001,mlcbm006,mlcbm010'  # GPU unavailable or broken on these nodes
