version: 1
formatters:
  colorlog:
    (): colorlog.ColoredFormatter
    format: "[%(cyan)s%(asctime)s%(reset)s][%(blue)sRank %(rank)s/%(world_size)s%(reset)s][%(name)s][%(log_color)s%(levelname)s%(reset)s] - %(message)s"
    log_colors:
      DEBUG: purple
      INFO: green
      WARNING: yellow
      ERROR: red
      CRITICAL: red
filters:
  rank_filter:
    (): diffusion_prune.logging.rank_filter.AddRankInfo
handlers:
  console:
    class: logging.StreamHandler
    formatter: colorlog
    filters: [rank_filter]
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    formatter: colorlog
    filters: [rank_filter]
    filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
root:
  level: INFO
  handlers:
    - console
    - file
disable_existing_loggers: false
